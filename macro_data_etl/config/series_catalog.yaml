# ─────────────────────────────────────────────────────────────────────
# CME FedWatch — Fed Funds Futures contract specifications
# ─────────────────────────────────────────────────────────────────────
fed_funds_futures:
  product_id: 305
  product_name: "30-Day Federal Funds Futures"
  exchange: "CME"
  tick_size: 0.005
  tick_value: 20.835
  contract_unit: "$5,000,000"
  settlement: "Cash settled"
  rate_derivation: "100 - settlement_price = implied_rate"
  fomc_months_ahead: 8  # how many upcoming FOMC meetings to track
