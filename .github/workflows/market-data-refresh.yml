name: Market data refresh

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Optional ISO start date. Defaults to a full backfill (2015-01-01)."
        required: false
        type: string
  schedule:
    # Weekdays after the US close. GitHub schedules are UTC.
    - cron: "45 21 * * 1-5"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      MARKET_DB_URL: ${{ secrets.MARKET_DB_URL }}
      MDP_ALLOW_YAHOO: "1"
      MDP_MARKET_REFRESH_LOOKBACK_DAYS: "14"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            polars duckdb pyarrow httpx tenacity pydantic pydantic-settings \
            pyyaml fastapi "uvicorn[standard]" apscheduler structlog \
            "psycopg[binary]" yfinance

      - name: Refresh DuckDB analytics
        run: |
          # GitHub Actions starts with an empty DuckDB each run (the file isn't
          # persisted), so always backfill full history — otherwise publish-views
          # would overwrite Neon with only a short recent window.
          START_DATE="${{ inputs.start_date }}"
          if [ -z "$START_DATE" ]; then
            START_DATE="2015-01-01"
          fi
          PYTHONPATH="$GITHUB_WORKSPACE" python -m market_data_pipeline.cli run --start "$START_DATE"

      - name: Publish views to Postgres
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE" python -m market_data_pipeline.cli publish-views
