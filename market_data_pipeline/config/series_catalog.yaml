# ════════════════ MACRO SERIES (source: FRED, official) ════════════════
# fred_units: API transform — lin (level), pc1 (YoY%), pch (MoM%), chg (change).
macro:
  # --- Policy / money-market rates ---
  - series_id: DFF
    fred_id: DFF
    display_name: "Fed Funds Effective Rate"
    asset_class: MACRO_RATE
    category: RATES
    unit: percent
    fred_units: lin
    frequency: D
  - series_id: SOFR
    fred_id: SOFR
    display_name: "SOFR"
    asset_class: MACRO_RATE
    category: RATES
    unit: percent
