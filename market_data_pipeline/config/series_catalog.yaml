# ─────────────────────────────────────────────────────────────────────
# Series catalog — the master definition of every asset & macro series.
# Drives ingestion (what to pull), the asset_master / macro_series_master
# tables, and analytics bucketing. Each entry maps a canonical series_id to
# its vendor symbol, source, asset_class, unit and display metadata.
# ─────────────────────────────────────────────────────────────────────

